services:
  backend:
    build: ./src
    ports:
      - "8080:8080"
    volumes:
      - ./database:/app/database   # Persistenz für H2
      - ./src:/app
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    command: [ "mvn", "spring-boot:run" ]

  docusaurus:
    build: ./docusaurus
    ports:
      - "3000:3000"
    volumes:
      - ./docusaurus:/app
    working_dir: /app
    command: [ "npm", "run", "start" ]